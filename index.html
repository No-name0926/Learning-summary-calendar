<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>学習集計カレンダー</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        /* UIデザインは変えず、動作の安定性を強化 */
        body { font-family: sans-serif; background-color: #f5f5f5; margin: 0; display: flex; flex-direction: column; align-items: center; -webkit-tap-highlight-color: transparent; }
        .container { width: 100%; max-width: 450px; padding: 20px 15px; box-sizing: border-box; }
        .achievement-header { text-align: center; margin-bottom: 20px; font-weight: bold; display: flex; justify-content: center; align-items: baseline; gap: 8px; }
        .pink-sparkle { color: #ff85a2; font-size: 24px; }
        .days-count { font-size: 42px; font-family: 'Arial Black', sans-serif; color: #333; border-bottom: 3px solid #ff85a2; line-height: 1; }
        .calendar-container { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 15px; }
        .header-nav { background: #0070bc; color: white; display: flex; justify-content: space-between; align-items: center; padding: 15px; }
        .nav-btn { background: rgba(255,255,255,0.2); color: white; border: 1px solid white; padding: 5px 15px; border-radius: 6px; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); background: #e0e0e0; gap: 1px; }
        .day-label { background: #f8f8f8; padding: 10px 0; text-align: center; font-size: 11px; font-weight: bold; color: #666; }
        .day { background: white; min-height: 75px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .date-num { width: 100%; padding: 5px 8px; font-size: 12px; }
        .stamp { font-size: 28px; height: 40px; line-height: 40px; }
        .stats-container { background: white; border-radius: 12px; border: 1px solid #ddd; padding: 18px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; text-align: center; margin-bottom: 10px; }
        .stat-item { background: #f9f9f9; padding: 8px; border-radius: 8px; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <div class="achievement-header">
        <span class="pink-sparkle">\\</span> 連続 <span class="days-count" id="streakDisplay">0</span> 日 達成中！ <span class="pink-sparkle">//</span>
    </div>
    <div class="calendar-container">
        <div class="header-nav"><button class="nav-btn" onclick="changeMonth(-1)">＜</button><div id="monthDisplay"></div><button class="nav-btn" onclick="changeMonth(1)">＞</button></div>
        <div class="grid" id="calendarGrid"></div>
    </div>
    <div class="stats-container">
        <div id="statsTitle" style="font-weight:bold; margin-bottom:10px;"></div>
        <div class="stats-grid" id="monthStats"></div>
    </div>
</div>
<script>
    const stamps = ['', '⚪', '🥉', '🥈', '🥇', '👑'];
    const valid = ['🥉', '🥈', '🥇', '👑'];
    let d = new Date();
    let y = d.getFullYear(), m = d.getMonth() + 1;

    function render() {
        document.getElementById('monthDisplay').innerText = `${y}年${m}月`;
        document.getElementById('statsTitle').innerText = `${m}月の集計`;
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        ['日','月','火','水','木','金','土'].forEach(l => {
            const el = document.createElement('div'); el.className = 'day-label'; el.innerText = l; grid.appendChild(el);
        });
        const first = new Date(y, m-1, 1).getDay();
        const days = new Date(y, m, 0).getDate();
        for(let i=0; i<first; i++) grid.appendChild(Object.assign(document.createElement('div'), {className:'day'}));
        for(let i=1; i<=days; i++){
            const day = document.createElement('div'); day.className = 'day';
            const key = `log-${y}-${m}-${i}`;
            const s = localStorage.getItem(key) || '';
            day.innerHTML = `<div class="date-num">${i}</div><div class="stamp">${s}</div>`;
            day.onclick = () => {
                let idx = (stamps.indexOf(s)+1)%stamps.length;
                if(stamps[idx]) localStorage.setItem(key, stamps[idx]); else localStorage.removeItem(key);
                render();
            };
            grid.appendChild(day);
        }
        calc();
    }

    function calc() {
        let streak = 0;
        let check = new Date(); check.setHours(0,0,0,0);
        
        // 今日が⚪なら即0、何もなければ昨日から遡る
        const getS = (date) => localStorage.getItem(`log-${date.getFullYear()}-${date.getMonth()+1}-${date.getDate()}`);
        
        if (getS(check) === '⚪') { streak = 0; }
        else {
            if (!valid.includes(getS(check))) check.setDate(check.getDate() - 1);
            while(valid.includes(getS(check))) {
                streak++;
                check.setDate(check.getDate() - 1);
            }
        }
        document.getElementById('streakDisplay').innerText = streak;
        
        // 月間集計
        const counts = {'🥉':0,'🥈':0,'🥇':0,'👑':0};
        for(let i=1; i<=31; i++) {
            const s = localStorage.getItem(`log-${y}-${m}-${i}`);
            if(valid.includes(s)) counts[s]++;
        }
        document.getElementById('monthStats').innerHTML = valid.map(s => `<div class="stat-item">${s}<span>${counts[s]}</span></div>`).join('');
    }

    function changeMonth(diff) { m += diff; if(m>12){m=1;y++;} else if(m<1){m=12;y--;} render(); }
    render();
</script>
</body>
</html>
